name: Deploy Seqera Platform (Manual)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write          # required for OIDC token exchange
  contents: read

env:
  TF_VAR_aws_profile: ""  # override tfvars: empty = use OIDC env vars
  AWS_REGION: YOUR_REGION  # e.g. eu-west-1 or us-east-1

jobs:

  plan:
    name: Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write terraform.tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: YOUR_REGION

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Extract hcl2json
        run: make extract_hcl2json

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: production     # manual approval gate — change to your environment name
    if: inputs.action == 'apply'
    steps:
      - uses: actions/checkout@v4

      - name: Write terraform.tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: YOUR_REGION

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Configure SSH include
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "Include $GITHUB_WORKSPACE/ssh_config" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Extract hcl2json
        run: make extract_hcl2json

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
