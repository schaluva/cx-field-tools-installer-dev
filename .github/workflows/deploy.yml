name: Deploy Seqera Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:       # manual trigger for hotfix redeploys

permissions:
  id-token: write          # required for OIDC token exchange
  contents: read

env:
  TF_VAR_aws_profile: ""  # override tfvars: empty = use OIDC env vars
  AWS_REGION: us-east-1

jobs:

  # Runs on every PR — validates config and shows plan
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Write terraform.tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.1"

      - name: Extract hcl2json
        run: make extract_hcl2json

      - name: Terraform init
        run: terraform init

      - name: Validate tfvars
        run: make verify

      - name: Terraform plan
        run: terraform plan -no-color

  # Runs on merge to main — requires manual approval
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: sc-ga-dev     # triggers manual approval gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Write terraform.tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.1"

      - name: Configure SSH include
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "Include $GITHUB_WORKSPACE/ssh_config" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Extract hcl2json
        run: make extract_hcl2json

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
