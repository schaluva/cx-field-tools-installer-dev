name: Deploy Seqera Platform

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Action to perform'
        required: false
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_aws_profile: ""
  AWS_REGION: us-east-1

jobs:

  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Write terraform.tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS_DEV }}
        run: echo "$TF_VARS" > terraform.tfvars

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Extract hcl2json
        run: make extract_hcl2json

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch' && inputs.action != 'destroy'
    steps:
      - uses: actions/checkout@v4

      - name: Write terraform.tfvars
        env:
          TF_VARS_DEV: ${{ secrets.TF_VARS_DEV }}
          TF_VARS_PROD: ${{ secrets.TF_VARS_PROD }}
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "$TF_VARS_PROD" > terraform.tfvars
          else
            echo "$TF_VARS_DEV" > terraform.tfvars
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'prod' && vars.AWS_DEPLOY_ROLE_ARN_PROD || vars.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Upgrade AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          sudo ln -sf /usr/local/aws-cli/v2/current/bin/aws /usr/bin/aws
          aws --version

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf 'ControlMaster auto\nControlPath /tmp/ssh-ctrl-%%r@%%h:%%p\nControlPersist 10m\n\nInclude %s/ssh_config\n' "$GITHUB_WORKSPACE" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Extract hcl2json
        run: make extract_hcl2json

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: |
          export PATH="/usr/local/aws-cli/v2/current/bin:$PATH"
          echo "AWS CLI: $(which aws) — $(aws --version)"
          terraform apply -auto-approve

  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    steps:
      - uses: actions/checkout@v4

      - name: Write terraform.tfvars
        env:
          TF_VARS_DEV: ${{ secrets.TF_VARS_DEV }}
          TF_VARS_PROD: ${{ secrets.TF_VARS_PROD }}
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "$TF_VARS_PROD" > terraform.tfvars
          else
            echo "$TF_VARS_DEV" > terraform.tfvars
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'prod' && vars.AWS_DEPLOY_ROLE_ARN_PROD || vars.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Upgrade AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          sudo ln -sf /usr/local/aws-cli/v2/current/bin/aws /usr/bin/aws
          aws --version

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf 'ControlMaster auto\nControlPath /tmp/ssh-ctrl-%%r@%%h:%%p\nControlPersist 10m\n\nInclude %s/ssh_config\n' "$GITHUB_WORKSPACE" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Extract hcl2json
        run: make extract_hcl2json

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy
        run: |
          export PATH="/usr/local/aws-cli/v2/current/bin:$PATH"
          echo "AWS CLI: $(which aws) — $(aws --version)"
          terraform destroy -auto-approve
